<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outreach Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8f04a;
    --accent2: #f0a84a;
    --text: #e8e8e8;
    --text-muted: #666;
    --text-dim: #999;
    --red: #ff5252;
    --green: #4affa0;
    --badge-7: #c8f04a;
    --badge-3m: #f0a84a;
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    padding: 40px 32px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
    color: var(--text);
  }
  header h1 span { color: var(--accent); }
  .header-meta { color: var(--text-muted); font-size: 11px; text-align: right; line-height: 1.8; }

  /* ── ALERTS BANNER ── */
  #alerts-section { margin-bottom: 28px; }
  .alert-banner {
    border-left: 3px solid;
    padding: 12px 16px;
    margin-bottom: 8px;
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 12px;
    border-radius: 0 var(--radius) var(--radius) 0;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
  .alert-7 { border-color: var(--badge-7); }
  .alert-3m { border-color: var(--badge-3m); }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .alert-7 .alert-dot { background: var(--badge-7); }
  .alert-3m .alert-dot { background: var(--badge-3m); }
  .alert-text { flex: 1; }
  .alert-text strong { display: block; font-size: 12px; }
  .alert-text span { color: var(--text-muted); font-size: 11px; }
  .alert-done-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .alert-done-btn:hover { border-color: var(--accent); color: var(--accent); }
  .alert-done-btn.done { border-color: var(--green); color: var(--green); text-decoration: line-through; }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 9px 12px 9px 32px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 12px;
  }
  select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 9px 12px;
    border-radius: var(--radius);
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  select:focus { border-color: var(--accent); }
  .btn {
    background: var(--accent);
    border: none;
    color: #0e0e0e;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: #d8ff5a; transform: translateY(-1px); }
  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 9px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

  /* ── STATS ── */
  .stats {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 18px;
    border-radius: var(--radius);
    min-width: 100px;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-label { color: var(--text-muted); font-size: 10px; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-total .stat-num { color: var(--text); }
  .stat-open .stat-num { color: var(--badge-7); }
  .stat-replied .stat-num { color: var(--green); }
  .stat-declined .stat-num { color: var(--red); }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    text-align: left;
    padding: 10px 14px;
    color: var(--text-muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent); }
  thead th .sort-arrow { margin-left: 4px; opacity: 0.5; }
  thead th.sorted .sort-arrow { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--surface); }
  tbody td { padding: 12px 14px; vertical-align: middle; }

  .agency-name { font-weight: 500; font-size: 13px; }
  .contact-name { color: var(--text-dim); font-size: 12px; }
  .email-link { color: var(--text-muted); font-size: 11px; text-decoration: none; }
  .email-link:hover { color: var(--accent); }
  .date-cell { color: var(--text-dim); font-size: 12px; white-space: nowrap; }
  .notes-cell { color: var(--text-muted); font-size: 11px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Status badge */
  .status-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .status-offen { background: rgba(200,240,74,0.12); color: var(--badge-7); border: 1px solid rgba(200,240,74,0.25); }
  .status-geantwortet { background: rgba(74,255,160,0.1); color: var(--green); border: 1px solid rgba(74,255,160,0.2); }
  .status-abgesagt { background: rgba(255,82,82,0.1); color: var(--red); border: 1px solid rgba(255,82,82,0.2); }

  /* Follow-up indicators */
  .followup-wrap { display: flex; gap: 4px; flex-wrap: wrap; }
  .fu-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 7px;
    border-radius: 2px;
    font-size: 10px;
    white-space: nowrap;
  }
  .fu-7 { background: rgba(200,240,74,0.1); color: var(--badge-7); border: 1px solid rgba(200,240,74,0.3); }
  .fu-3m { background: rgba(240,168,74,0.1); color: var(--badge-3m); border: 1px solid rgba(240,168,74,0.3); }
  .fu-done { opacity: 0.3; text-decoration: line-through; }
  .fu-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* Action buttons */
  .action-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 8px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    transition: all 0.15s;
    margin-right: 4px;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.del:hover { border-color: var(--red); color: var(--red); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 32px;
    width: 520px;
    max-width: 95vw;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    margin-bottom: 24px;
    color: var(--text);
  }
  .form-row { margin-bottom: 16px; }
  .form-row label {
    display: block;
    color: var(--text-muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .form-row input,
  .form-row textarea,
  .form-row select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }
  .form-row input:focus,
  .form-row textarea:focus,
  .form-row select:focus { border-color: var(--accent); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 18px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .empty-icon { font-size: 32px; margin-bottom: 12px; }
  .empty-state p { font-size: 12px; line-height: 1.8; }

  /* Tooltip for notes */
  td[data-notes]:hover::after {
    content: attr(data-notes);
    position: absolute;
    background: #1a1a1a;
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 11px;
    color: var(--text-dim);
    max-width: 260px;
    white-space: normal;
    z-index: 10;
    margin-top: 4px;
    line-height: 1.6;
    pointer-events: none;
  }
  td[data-notes] { position: relative; cursor: default; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .no-results { text-align: center; padding: 40px; color: var(--text-muted); font-size: 12px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Outreach<span>.</span></h1>
    <div style="color:var(--text-muted);font-size:11px;margin-top:6px;">Agenturen & Creative Directors</div>
  </div>
  <div class="header-meta">
    <div id="current-date"></div>
    <div style="margin-top:2px;">Follow-Ups: 7 Tage & 3 Monate</div>
  </div>
</header>

<!-- ALERTS -->
<div id="alerts-section"></div>

<!-- STATS -->
<div class="stats">
  <div class="stat stat-total"><div class="stat-num" id="s-total">0</div><div class="stat-label">Gesamt</div></div>
  <div class="stat stat-open"><div class="stat-num" id="s-offen">0</div><div class="stat-label">Offen</div></div>
  <div class="stat stat-replied"><div class="stat-num" id="s-replied">0</div><div class="stat-label">Geantwortet</div></div>
  <div class="stat stat-declined"><div class="stat-num" id="s-declined">0</div><div class="stat-label">Abgesagt</div></div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search-input" placeholder="Suche nach Agentur, Name, E-Mail…">
  </div>
  <select id="filter-status">
    <option value="">Alle Status</option>
    <option value="offen">Offen</option>
    <option value="geantwortet">Geantwortet</option>
    <option value="abgesagt">Abgesagt</option>
  </select>
  <select id="sort-select">
    <option value="date-desc">Neueste zuerst</option>
    <option value="date-asc">Älteste zuerst</option>
    <option value="agency-asc">Agentur A–Z</option>
    <option value="agency-desc">Agentur Z–A</option>
    <option value="status">Status</option>
  </select>
  <button class="btn" onclick="openModal()">+ Neu</button>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="setSort('agency')">Agentur <span class="sort-arrow">↕</span></th>
        <th>Ansprechpartner</th>
        <th>E-Mail</th>
        <th onclick="setSort('date')">Datum <span class="sort-arrow">↕</span></th>
        <th>Status</th>
        <th>Follow-Ups</th>
        <th>Notizen</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
  <div id="empty-state" class="empty-state" style="display:none">
    <div class="empty-icon">✉</div>
    <p>Noch keine Einträge.<br>Füge deine erste Agentur hinzu.</p>
  </div>
  <div id="no-results" class="no-results" style="display:none">Keine Ergebnisse für diese Suche.</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Neue Agentur</h2>
    <div class="form-grid">
      <div class="form-row">
        <label>Agentur / Firma *</label>
        <input type="text" id="f-agency" placeholder="z.B. Jung von Matt">
      </div>
      <div class="form-row">
        <label>Ansprechpartner</label>
        <input type="text" id="f-contact" placeholder="Vor- und Nachname">
      </div>
    </div>
    <div class="form-row">
      <label>E-Mail</label>
      <input type="email" id="f-email" placeholder="name@agentur.de">
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Angeschrieben am *</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-row">
        <label>Status</label>
        <select id="f-status">
          <option value="offen">Offen</option>
          <option value="geantwortet">Geantwortet</option>
          <option value="abgesagt">Abgesagt</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>Notizen</label>
      <textarea id="f-notes" rows="3" placeholder="Projekt, Kontext, Besonderheiten…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn" onclick="saveEntry()">Speichern</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let entries = JSON.parse(localStorage.getItem('outreach-entries') || '[]');
let doneAlerts = JSON.parse(localStorage.getItem('outreach-done-alerts') || '[]');
let editId = null;
let sortField = 'date';
let sortDir = 'desc';

// ── UTILS ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function today() { return new Date().toISOString().slice(0,10); }
function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
function addDays(dateStr, n) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}
function formatDate(str) {
  if (!str) return '—';
  const [y,m,d] = str.split('-');
  return `${d}.${m}.${y}`;
}
function save() {
  localStorage.setItem('outreach-entries', JSON.stringify(entries));
  localStorage.setItem('outreach-done-alerts', JSON.stringify(doneAlerts));
}

// ── ALERT LOGIC ──
function getAlerts() {
  const td = today();
  const alerts = [];
  entries.forEach(e => {
    if (e.status === 'abgesagt') return; // keine Follow-Ups bei Abgesagt
    const days = daysBetween(e.date, td);
    // 7-Tage-Follow-Up: nur wenn noch OFFEN
    if (e.status === 'offen' && days >= 7) {
      const key = `7d-${e.id}`;
      alerts.push({ key, type: '7d', entry: e, days });
    }
    // 3-Monats-Follow-Up: bei Offen UND Geantwortet
    if (days >= 90) {
      const key = `3m-${e.id}`;
      alerts.push({ key, type: '3m', entry: e, days });
    }
  });
  return alerts;
}

function renderAlerts() {
  const alerts = getAlerts().filter(a => !doneAlerts.includes(a.key));
  const sec = document.getElementById('alerts-section');
  if (alerts.length === 0) { sec.innerHTML = ''; return; }

  sec.innerHTML = alerts.slice(0, 5).map(a => {
    const cls = a.type === '7d' ? 'alert-7' : 'alert-3m';
    const label = a.type === '7d'
      ? `Follow-Up: <strong>${a.entry.agency}</strong> — 7-Tage-Mail`
      : `Neues Projekt: <strong>${a.entry.agency}</strong> — 3-Monats-Mail`;
    const sub = a.type === '7d'
      ? `Angeschrieben vor ${a.days} Tagen (${formatDate(a.entry.date)})`
      : `Angeschrieben vor ${a.days} Tagen — zeig ihnen was Neues`;
    return `<div class="alert-banner ${cls}">
      <div class="alert-dot"></div>
      <div class="alert-text"><strong>${a.type === '7d' ? '⏰ ' : '🚀 '}${a.entry.agency}${a.entry.contact ? ' – '+a.entry.contact : ''}</strong><span>${a.type === '7d' ? 'Follow-Up Mail fällig · Angeschrieben vor '+a.days+' Tagen ('+formatDate(a.entry.date)+')' : 'Neues Projekt pitchen · '+a.days+' Tage vergangen'}</span></div>
      <button class="alert-done-btn" onclick="dismissAlert('${a.key}')">✓ Erledigt</button>
    </div>`;
  }).join('');

  if (alerts.length > 5) {
    sec.innerHTML += `<div style="padding:8px 16px;color:var(--text-muted);font-size:11px;">+${alerts.length-5} weitere Follow-Ups</div>`;
  }
}

function dismissAlert(key) {
  doneAlerts.push(key);
  save();
  renderAlerts();
}

// ── FOLLOW-UP BADGES (in table) ──
function getFollowupBadges(entry) {
  if (entry.status === 'abgesagt') return '<span style="color:var(--text-muted);font-size:11px;">—</span>';
  const td = today();
  const days = daysBetween(entry.date, td);
  let out = '';

  // 7-Tage-Badge nur bei "offen"
  if (entry.status === 'offen' && days >= 7) {
    const key = `7d-${entry.id}`;
    const done = doneAlerts.includes(key);
    out += `<span class="fu-badge fu-7 ${done?'fu-done':''}"><span class="fu-dot"></span>7T-Mail</span> `;
  }
  // 3-Monats-Badge bei "offen" und "geantwortet"
  if (days >= 90) {
    const key = `3m-${entry.id}`;
    const done = doneAlerts.includes(key);
    out += `<span class="fu-badge fu-3m ${done?'fu-done':''}"><span class="fu-dot"></span>3M-Projekt</span>`;
  }
  if (!out) {
    if (entry.status === 'offen') {
      const next = addDays(entry.date, 7);
      const daysLeft = daysBetween(td, next);
      if (daysLeft > 0) out = `<span style="color:var(--text-muted);font-size:11px;">Follow-Up in ${daysLeft}d</span>`;
    } else if (entry.status === 'geantwortet') {
      const next = addDays(entry.date, 90);
      const daysLeft = daysBetween(td, next);
      if (daysLeft > 0) out = `<span style="color:var(--text-muted);font-size:11px;">Projekt in ${daysLeft}d</span>`;
    }
  }
  return out || '—';
}

// ── RENDER TABLE ──
function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const fs = document.getElementById('filter-status').value;
  let list = entries.filter(e => {
    const match = !q || [e.agency,e.contact,e.email,e.notes].some(f => f&&f.toLowerCase().includes(q));
    const statusMatch = !fs || e.status === fs;
    return match && statusMatch;
  });

  const sd = document.getElementById('sort-select').value;
  list.sort((a,b) => {
    if (sd === 'date-desc') return b.date.localeCompare(a.date);
    if (sd === 'date-asc') return a.date.localeCompare(b.date);
    if (sd === 'agency-asc') return a.agency.localeCompare(b.agency);
    if (sd === 'agency-desc') return b.agency.localeCompare(a.agency);
    if (sd === 'status') return a.status.localeCompare(b.status);
    return 0;
  });
  return list;
}

function renderTable() {
  const list = getFiltered();
  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty-state');
  const noRes = document.getElementById('no-results');

  // Stats
  document.getElementById('s-total').textContent = entries.length;
  document.getElementById('s-offen').textContent = entries.filter(e=>e.status==='offen').length;
  document.getElementById('s-replied').textContent = entries.filter(e=>e.status==='geantwortet').length;
  document.getElementById('s-declined').textContent = entries.filter(e=>e.status==='abgesagt').length;

  if (entries.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    noRes.style.display = 'none';
    return;
  }
  empty.style.display = 'none';

  if (list.length === 0) {
    tbody.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  const statusLabel = { offen: 'Offen', geantwortet: 'Geantwortet', abgesagt: 'Abgesagt' };

  tbody.innerHTML = list.map(e => `
    <tr>
      <td><div class="agency-name">${esc(e.agency)}</div></td>
      <td><div class="contact-name">${esc(e.contact||'—')}</div></td>
      <td>${e.email ? `<a class="email-link" href="mailto:${esc(e.email)}">${esc(e.email)}</a>` : '<span style="color:var(--text-muted)">—</span>'}</td>
      <td><div class="date-cell">${formatDate(e.date)}</div></td>
      <td><span class="status-badge status-${e.status}">${statusLabel[e.status]||e.status}</span></td>
      <td><div class="followup-wrap">${getFollowupBadges(e)}</div></td>
      <td ${e.notes?`data-notes="${esc(e.notes)}"`:''}><div class="notes-cell">${esc(e.notes||'—')}</div></td>
      <td style="white-space:nowrap">
        <button class="action-btn" onclick="editEntry('${e.id}')">Bearbeiten</button>
        <button class="action-btn del" onclick="deleteEntry('${e.id}')">✕</button>
      </td>
    </tr>
  `).join('');
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── MODAL ──
function openModal(id) {
  editId = id || null;
  document.getElementById('modal-title').textContent = id ? 'Eintrag bearbeiten' : 'Neue Agentur';
  if (id) {
    const e = entries.find(x=>x.id===id);
    document.getElementById('f-agency').value = e.agency;
    document.getElementById('f-contact').value = e.contact||'';
    document.getElementById('f-email').value = e.email||'';
    document.getElementById('f-date').value = e.date;
    document.getElementById('f-status').value = e.status;
    document.getElementById('f-notes').value = e.notes||'';
  } else {
    document.getElementById('f-agency').value = '';
    document.getElementById('f-contact').value = '';
    document.getElementById('f-email').value = '';
    document.getElementById('f-date').value = today();
    document.getElementById('f-status').value = 'offen';
    document.getElementById('f-notes').value = '';
  }
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-agency').focus();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editId = null;
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function saveEntry() {
  const agency = document.getElementById('f-agency').value.trim();
  const date = document.getElementById('f-date').value;
  if (!agency) { document.getElementById('f-agency').focus(); return; }
  if (!date) { document.getElementById('f-date').focus(); return; }

  const data = {
    agency,
    contact: document.getElementById('f-contact').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    date,
    status: document.getElementById('f-status').value,
    notes: document.getElementById('f-notes').value.trim(),
  };

  if (editId) {
    const idx = entries.findIndex(x=>x.id===editId);
    entries[idx] = { ...entries[idx], ...data };
  } else {
    entries.unshift({ id: uid(), ...data });
  }
  save();
  closeModal();
  renderAlerts();
  renderTable();
}

function editEntry(id) { openModal(id); }
function deleteEntry(id) {
  if (!confirm('Eintrag wirklich löschen?')) return;
  entries = entries.filter(e=>e.id!==id);
  save();
  renderAlerts();
  renderTable();
}

function setSort(field) {
  const sel = document.getElementById('sort-select');
  if (field === 'date') sel.value = sel.value === 'date-desc' ? 'date-asc' : 'date-desc';
  if (field === 'agency') sel.value = sel.value === 'agency-asc' ? 'agency-desc' : 'agency-asc';
  renderTable();
}

// ── DATE DISPLAY ──
document.getElementById('current-date').textContent = new Date().toLocaleDateString('de-DE', {weekday:'long',day:'numeric',month:'long',year:'numeric'});

// ── EVENTS ──
document.getElementById('search-input').addEventListener('input', renderTable);
document.getElementById('filter-status').addEventListener('change', renderTable);
document.getElementById('sort-select').addEventListener('change', renderTable);

</script>
